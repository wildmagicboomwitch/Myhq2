<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Family Space — My HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style id="myhq-styles">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d1a;--surface:#12122a;--card:#1a1a3e;--accent:#f472b6;--accent2:#34d399;--elder:#e94560;--younger:#c084fc;--text:#f1f5f9;--text-muted:#94a3b8;--star:#fbbf24;--danger:#f87171;--success:#4ade80;--radius:20px;--radius-sm:12px;--font-main:'Nunito',sans-serif;--font-display:'Fredoka One',cursive;}
html,body{min-height:100vh;font-family:var(--font-main);background:var(--bg);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(244,114,182,0.08) 0%,transparent 70%),var(--bg);pointer-events:none;}
#app{position:relative;z-index:1;max-width:600px;margin:0 auto;}
.topbar{padding:16px 20px 0;display:flex;align-items:center;gap:10px;}
.back-btn{background:var(--card);border:none;border-radius:10px;padding:8px 12px;color:var(--text);font-size:18px;cursor:pointer;transition:all .2s;}
.back-btn:hover{background:var(--accent);}
.topbar-title{font-family:var(--font-display);font-size:22px;color:var(--accent);flex:1;}
.page{padding:16px 20px 100px;display:flex;flex-direction:column;gap:14px;}

/* TABS */
.tabs{display:flex;background:var(--card);border-radius:var(--radius-sm);padding:4px;gap:4px;}
.tab{flex:1;background:transparent;border:none;border-radius:8px;padding:10px 6px;font-size:12px;font-weight:800;color:var(--text-muted);cursor:pointer;font-family:var(--font-main);transition:all .2s;}
.tab.active{background:var(--accent);color:#fff;}

/* WIN WALL */
.win-wall{display:flex;flex-direction:column;gap:10px;}
.win-wall-card{background:var(--card);border-radius:var(--radius);padding:16px;border:2px solid rgba(255,255,255,.06);}
.ww-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ww-name{font-family:var(--font-display);font-size:17px;}
.ww-name.elder{color:var(--elder);}
.ww-name.younger{color:var(--younger);}
.ww-wins{display:flex;flex-direction:column;gap:6px;}
.ww-win{background:rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px;}
.ww-win-emoji{font-size:20px;flex-shrink:0;}
.ww-win-text{font-size:13px;font-weight:700;flex:1;}
.ww-win-date{font-size:11px;font-weight:700;color:var(--text-muted);flex-shrink:0;}
.ww-empty{font-size:13px;font-weight:700;color:var(--text-muted);padding:8px 0;}

/* BULLETIN BOARD */
.bulletin-board{display:flex;flex-direction:column;gap:10px;}
.note-card{border-radius:var(--radius-sm);padding:16px;position:relative;animation:noteIn .3s ease;}
@keyframes noteIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.note-card.parent{background:rgba(251,191,36,.08);border:2px solid rgba(251,191,36,.2);}
.note-card.elder{background:rgba(233,69,96,.08);border:2px solid rgba(233,69,96,.2);}
.note-card.younger{background:rgba(192,132,252,.08);border:2px solid rgba(192,132,252,.2);}
.note-from{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.note-from.parent{color:var(--star);}
.note-from.elder{color:var(--elder);}
.note-from.younger{color:var(--younger);}
.note-text{font-size:14px;font-weight:700;line-height:1.5;}
.note-date{font-size:11px;color:var(--text-muted);margin-top:6px;}
.note-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s;}
.note-del:hover{color:var(--danger);}

/* ADD NOTE */
.add-note-box{background:var(--card);border:2px solid rgba(244,114,182,.15);border-radius:var(--radius);padding:16px;}
.add-note-label{font-size:12px;font-weight:900;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.add-note-input{width:100%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;color:var(--text);font-family:var(--font-main);outline:none;resize:none;min-height:60px;transition:border-color .2s;line-height:1.5;}
.add-note-input:focus{border-color:var(--accent);}
.add-note-input::placeholder{color:rgba(255,255,255,.18);}
.add-note-btn{width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:900;color:#fff;cursor:pointer;font-family:var(--font-main);margin-top:10px;transition:all .2s;}
.add-note-btn:hover{transform:translateY(-1px);}

/* SISTER NOTES */
.sister-section{background:var(--card);border:2px solid rgba(244,114,182,.1);border-radius:var(--radius);padding:16px;}
.sister-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sister-title{font-family:var(--font-display);font-size:18px;color:var(--accent);}
.sister-notes-list{display:flex;flex-direction:column;gap:8px;}
.sister-note{background:rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid rgba(255,255,255,.06);}
.sn-from{font-size:11px;font-weight:900;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.sn-text{font-size:14px;font-weight:700;line-height:1.4;}
.sn-date{font-size:11px;color:var(--text-muted);margin-top:4px;}
.sister-input-wrap{display:flex;gap:8px;margin-top:12px;}
.sister-input{flex:1;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--font-main);outline:none;transition:border-color .2s;}
.sister-input:focus{border-color:var(--accent);}
.sister-input::placeholder{color:rgba(255,255,255,.18);}
.sister-send-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);padding:10px 16px;font-size:14px;font-weight:900;color:#fff;cursor:pointer;font-family:var(--font-main);transition:all .2s;flex-shrink:0;}
.sister-send-btn:hover{transform:scale(1.04);}

/* EMPTY */
.empty-mini{font-size:13px;font-weight:700;color:var(--text-muted);padding:12px 0;text-align:center;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:var(--surface);border-top:1px solid rgba(255,255,255,.08);display:flex;z-index:90;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;text-decoration:none;color:var(--text-muted);border:none;background:none;font-family:var(--font-main);transition:color .2s;}
.nav-item .nav-emoji{font-size:22px;}.nav-item .nav-label{font-size:10px;font-weight:800;}
.nav-item.active{color:var(--accent);}
.sos-fab{position:fixed;bottom:84px;right:20px;z-index:100;background:linear-gradient(135deg,#f87171,#e94560);color:white;border:none;border-radius:50%;width:56px;height:56px;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(233,69,96,.5);display:flex;align-items:center;justify-content:center;animation:sosPulse 3s ease-in-out infinite;}
@keyframes sosPulse{0%,100%{box-shadow:0 4px 20px rgba(233,69,96,.5)}50%{box-shadow:0 4px 30px rgba(233,69,96,.8),0 0 0 8px rgba(233,69,96,.1)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;}}
</style>
</head>
<body>
<div id="app">
<div class="topbar">
  <button class="back-btn" id="backBtn">←</button>
  <div class="topbar-title" id="pageTitle">🏠 Family Space</div>
</div>
<main class="page">

  <div class="tabs">
    <button class="tab active" data-tab="wins">🌟 Win Wall</button>
    <button class="tab"        data-tab="board">📌 Board</button>
    <button class="tab"        data-tab="sister">💌 Sister Notes</button>
  </div>

  <!-- WIN WALL -->
  <div id="tabWins">
    <div class="win-wall" id="winWall"></div>
  </div>

  <!-- BULLETIN BOARD -->
  <div id="tabBoard" style="display:none">
    <div class="add-note-box">
      <div class="add-note-label">Post something 📌</div>
      <textarea class="add-note-input" id="noteInput" placeholder="Share something with your family!" maxlength="200"></textarea>
      <button class="add-note-btn" id="postNoteBtn">Post to the board 📌</button>
    </div>
    <div class="bulletin-board" id="bulletinBoard"></div>
  </div>

  <!-- SISTER NOTES -->
  <div id="tabSister" style="display:none">
    <div class="sister-section">
      <div class="sister-header">
        <div class="sister-title" id="sisterTitle">Notes to your sister 💌</div>
      </div>
      <div class="sister-notes-list" id="sisterNotesList"></div>
      <div class="sister-input-wrap">
        <input type="text" class="sister-input" id="sisterInput" placeholder="Write your sister a note..." maxlength="120">
        <button class="sister-send-btn" id="sisterSendBtn">Send 💌</button>
      </div>
    </div>
  </div>

</main>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><span class="nav-emoji">🏠</span><span class="nav-label">Home</span></a>
  <a class="nav-item" href="chores.html"><span class="nav-emoji">✅</span><span class="nav-label">Jobs</span></a>
  <a class="nav-item" href="feelings-hub.html"><span class="nav-emoji">💜</span><span class="nav-label">Feelings</span></a>
  <a class="nav-item" href="school.html"><span class="nav-emoji">📚</span><span class="nav-label">School</span></a>
  <a class="nav-item" href="wins.html"><span class="nav-emoji">⭐</span><span class="nav-label">Wins</span></a>
</nav>
<button class="sos-fab" onclick="window.location.href='volcano.html'">🆘</button>

<script src="myhq-core.js"></script>
<script id="myhq-family-app">
let profileId  = null;
let activeTab  = 'wins';
const OTHER_ID = { elder:'younger', younger:'elder' };

function formatDate(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000)    return 'Just now';
  if (diff < 3600000)  return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

/* ── WIN WALL ── */
function renderWinWall() {
  const wall = document.getElementById('winWall');
  wall.innerHTML = '';

  ['elder','younger'].forEach(pid => {
    const profile = Profiles.get(pid);
    const wins    = WinJar.getWins(pid).filter(w => w.shared !== false).slice(0, 5);
    const mascot  = MYHQ.MASCOTS.find(m => m.id === profile.mascot) || MYHQ.MASCOTS[0];
    const name    = profile.displayName || (pid === 'elder' ? 'Older girl' : 'Younger girl');

    const card = document.createElement('div');
    card.className = 'win-wall-card';
    card.innerHTML = `
      <div class="ww-header">
        <span style="font-size:28px">${mascot.emoji}</span>
        <div class="ww-name ${pid}">${name}'s Wins</div>
      </div>
      <div class="ww-wins">
        ${wins.length === 0
          ? `<div class="ww-empty">No wins shared yet 🌱</div>`
          : wins.map(w => `
            <div class="ww-win">
              <span class="ww-win-emoji">${w.emoji||'⭐'}</span>
              <span class="ww-win-text">${w.text}</span>
              <span class="ww-win-date">${formatDate(w.date)}</span>
            </div>`).join('')}
      </div>
    `;
    wall.appendChild(card);
  });
}

/* ── BULLETIN BOARD ── */
function getNotes() { return Store.get('family-bulletin', []); }
function saveNotes(n) { Store.set('family-bulletin', n); }

function renderBulletin() {
  const board = document.getElementById('bulletinBoard');
  const notes = getNotes();
  board.innerHTML = '';

  if (notes.length === 0) {
    board.innerHTML = '<div class="empty-mini">Nothing posted yet! Be the first 📌</div>';
    return;
  }

  notes.forEach(note => {
    const el = document.createElement('div');
    el.className = `note-card ${note.from}`;
    const fromLabel = note.from === 'parent' ? '👨‍👩‍👧 Parent'
      : note.from === 'elder' ? `${Profiles.get('elder')?.displayName || 'Older girl'}`
      : `${Profiles.get('younger')?.displayName || 'Younger girl'}`;
    el.innerHTML = `
      <div class="note-from ${note.from}">${fromLabel}</div>
      <div class="note-text">${note.text}</div>
      <div class="note-date">${formatDate(note.date)}</div>
      ${note.from === profileId ? `<button class="note-del" data-id="${note.id}">🗑</button>` : ''}
    `;
    el.querySelector('.note-del')?.addEventListener('click', () => {
      saveNotes(getNotes().filter(n => n.id !== note.id));
      renderBulletin();
    });
    board.appendChild(el);
  });
}

function postNote() {
  const text = document.getElementById('noteInput').value.trim();
  if (!text) return;
  const notes = getNotes();
  notes.unshift({ id:Date.now(), from:profileId, text, date:new Date().toISOString() });
  saveNotes(notes.slice(0, 50));
  document.getElementById('noteInput').value = '';
  renderBulletin();
}

/* ── SISTER NOTES ── */
function getSisterNotes() { return Store.get('sister-notes', []); }
function saveSisterNotes(n) { Store.set('sister-notes', n); }

function renderSisterNotes() {
  const list  = document.getElementById('sisterNotesList');
  const notes = getSisterNotes().slice(0, 20);
  const otherProfile = Profiles.get(OTHER_ID[profileId]);
  const otherName    = otherProfile?.displayName || (OTHER_ID[profileId] === 'elder' ? 'Your sister' : 'Your sister');

  document.getElementById('sisterTitle').textContent = `Notes with ${otherName} 💌`;
  list.innerHTML = '';

  if (notes.length === 0) {
    list.innerHTML = '<div class="empty-mini">No notes yet — say hi to your sister! 💌</div>';
    return;
  }

  notes.forEach(note => {
    const isMe   = note.from === profileId;
    const fromName = isMe ? 'You' : otherName;
    const el = document.createElement('div');
    el.className = 'sister-note';
    el.style.marginLeft = isMe ? '16px' : '0';
    el.style.borderColor = isMe ? 'rgba(244,114,182,.2)' : 'rgba(255,255,255,.08)';
    el.innerHTML = `
      <div class="sn-from" style="color:${isMe ? 'var(--accent)' : OTHER_ID[profileId]==='elder'?'var(--elder)':'var(--younger)'}">${fromName}</div>
      <div class="sn-text">${note.text}</div>
      <div class="sn-date">${formatDate(note.date)}</div>
    `;
    list.appendChild(el);
  });
}

function sendSisterNote() {
  const text = document.getElementById('sisterInput').value.trim();
  if (!text) return;
  const notes = getSisterNotes();
  notes.unshift({ id:Date.now(), from:profileId, to:OTHER_ID[profileId], text, date:new Date().toISOString() });
  saveSisterNotes(notes.slice(0, 100));
  document.getElementById('sisterInput').value = '';
  renderSisterNotes();
}

/* ── INIT ── */
function init() {
  const session = Auth.getSession();
  if (!session || !['elder','younger'].includes(session.profileId)) { window.location.href = 'index.html'; return; }
  profileId = session.profileId;
  Profiles.applyTheme(profileId);

  renderWinWall();
  renderBulletin();
  renderSisterNotes();

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      document.getElementById('tabWins').style.display   = activeTab === 'wins'   ? '' : 'none';
      document.getElementById('tabBoard').style.display  = activeTab === 'board'  ? '' : 'none';
      document.getElementById('tabSister').style.display = activeTab === 'sister' ? '' : 'none';
    });
  });

  document.getElementById('postNoteBtn').addEventListener('click', postNote);
  document.getElementById('noteInput').addEventListener('keydown', e => { if (e.key === 'Enter' && e.metaKey) postNote(); });
  document.getElementById('sisterSendBtn').addEventListener('click', sendSisterNote);
  document.getElementById('sisterInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendSisterNote(); });
  document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'index.html');
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
