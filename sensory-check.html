<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Body Check — My HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style id="myhq-styles">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d1a;--surface:#12122a;--card:#1a1a3e;--accent:#a78bfa;--accent2:#34d399;--text:#f1f5f9;--text-muted:#94a3b8;--danger:#f87171;--success:#4ade80;--radius:20px;--radius-sm:12px;--font-main:'Nunito',sans-serif;--font-display:'Fredoka One',cursive;}
html,body{min-height:100vh;font-family:var(--font-main);background:var(--bg);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(167,139,250,0.1) 0%,transparent 70%),var(--bg);pointer-events:none;}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;}
.page{padding:20px 20px 100px;display:flex;flex-direction:column;align-items:center;gap:20px;}

.back-btn{position:fixed;top:16px;left:16px;z-index:100;background:rgba(255,255,255,.08);border:none;border-radius:12px;padding:10px 16px;color:rgba(200,200,255,.7);font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font-main);backdrop-filter:blur(8px);transition:all .2s;}
.back-btn:hover{background:rgba(255,255,255,.15);color:#fff;}

/* HEADER */
.header{text-align:center;padding-top:60px;width:100%;}
.header-emoji{font-size:64px;display:block;margin-bottom:8px;animation:bob 2.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.header-title{font-family:var(--font-display);font-size:28px;color:var(--accent);margin-bottom:6px;}
.header-sub{font-size:14px;font-weight:700;color:var(--text-muted);line-height:1.5;max-width:300px;margin:0 auto;}

/* PROGRESS BAR */
.scan-progress-wrap{width:100%;background:rgba(255,255,255,.06);border-radius:20px;height:8px;overflow:hidden;}
.scan-progress-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;width:0%;}

/* SCAN CARD (one at a time) */
.scan-card{
  width:100%;background:var(--card);
  border:2px solid rgba(255,255,255,.06);border-radius:var(--radius);
  padding:28px 20px;text-align:center;
  animation:cardIn .4s ease;
  display:none;
}
.scan-card.active{display:block;}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.scan-icon{font-size:64px;display:block;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(167,139,250,.3));}
.scan-question{font-family:var(--font-display);font-size:22px;color:var(--accent);margin-bottom:6px;}
.scan-hint{font-size:13px;font-weight:700;color:var(--text-muted);line-height:1.4;margin-bottom:20px;}

/* ANSWER BUTTONS */
.answer-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.answer-btn{
  background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);
  border-radius:var(--radius);padding:16px 20px;
  font-size:15px;font-weight:800;cursor:pointer;
  transition:all .2s;font-family:var(--font-main);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  min-width:100px;color:var(--text);
}
.answer-btn .ab-emoji{font-size:28px;}
.answer-btn:hover{border-color:var(--btn-color,var(--accent));transform:scale(1.04);}
.answer-btn.ok:hover,.answer-btn.ok.selected{border-color:#4ade80;background:rgba(74,222,128,.1);color:#4ade80;}
.answer-btn.flag:hover,.answer-btn.flag.selected{border-color:#f87171;background:rgba(248,113,113,.1);color:#f87171;}

/* RESULTS PANEL */
.results-panel{width:100%;display:none;flex-direction:column;gap:12px;animation:cardIn .4s ease;}
.results-panel.show{display:flex;}
.results-title{font-family:var(--font-display);font-size:22px;color:var(--accent);text-align:center;}

.result-item{
  background:var(--card);border-radius:var(--radius-sm);padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  border:2px solid transparent;
}
.result-item.flagged{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.05);}
.result-item.ok{border-color:rgba(74,222,128,.2);}
.ri-icon{font-size:28px;flex-shrink:0;}
.ri-info{flex:1;}
.ri-label{font-size:14px;font-weight:800;margin-bottom:2px;}
.ri-action{font-size:12px;font-weight:700;line-height:1.4;}
.ri-action.flagged{color:var(--danger);}
.ri-action.ok{color:var(--accent2);}

/* ALL OK */
.all-ok{background:rgba(74,222,128,.1);border:2px solid rgba(74,222,128,.25);border-radius:var(--radius);padding:20px;text-align:center;}
.all-ok-emoji{font-size:48px;display:block;margin-bottom:8px;}
.all-ok-title{font-family:var(--font-display);font-size:22px;color:var(--success);}
.all-ok-sub{font-size:13px;font-weight:700;color:var(--text-muted);margin-top:4px;}

/* ALERT SENT */
.alert-banner{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;font-weight:800;color:var(--accent);text-align:center;display:none;}
.alert-banner.show{display:block;animation:cardIn .3s ease;}

/* ACTION BTNS */
.action-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.act-btn{width:100%;background:var(--card);border:2px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:900;cursor:pointer;font-family:var(--font-main);color:var(--text);transition:all .2s;text-decoration:none;display:block;text-align:center;}
.act-btn:hover{border-color:var(--accent);color:var(--accent);}
.act-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.act-btn.primary:hover{opacity:.9;transform:translateY(-1px);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:var(--surface);border-top:1px solid rgba(255,255,255,.08);display:flex;z-index:90;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;text-decoration:none;color:var(--text-muted);border:none;background:none;font-family:var(--font-main);transition:color .2s;}
.nav-item .nav-emoji{font-size:22px;}.nav-item .nav-label{font-size:10px;font-weight:800;}
.nav-item.active{color:var(--accent);}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;}}
</style>
</head>
<body>

<button class="back-btn" id="backBtn">← Back</button>

<div id="app">
<main class="page">

  <div class="header">
    <span class="header-emoji" id="headerEmoji">🌡️</span>
    <div class="header-title">Quick Body Check</div>
    <div class="header-sub">Let's see how your body is doing right now. Just be honest!</div>
  </div>

  <div class="scan-progress-wrap">
    <div class="scan-progress-bar" id="progressBar"></div>
  </div>

  <!-- Scan cards injected by JS -->
  <div id="scanCards" style="width:100%"></div>

  <!-- Results -->
  <div class="results-panel" id="resultsPanel">
    <div class="results-title" id="resultsTitle">Here's what I found 🌡️</div>
    <div id="resultsItems"></div>
    <div class="alert-banner" id="alertBanner">💜 A parent has been notified</div>
    <div class="action-btns" id="actionBtns"></div>
  </div>

</main>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><span class="nav-emoji">🏠</span><span class="nav-label">Home</span></a>
  <a class="nav-item" href="chores.html"><span class="nav-emoji">✅</span><span class="nav-label">Jobs</span></a>
  <a class="nav-item" href="feelings-hub.html"><span class="nav-emoji">💜</span><span class="nav-label">Feelings</span></a>
  <a class="nav-item" href="school.html"><span class="nav-emoji">📚</span><span class="nav-label">School</span></a>
  <a class="nav-item" href="wins.html"><span class="nav-emoji">⭐</span><span class="nav-label">Wins</span></a>
</nav>

<script src="myhq-core.js"></script>
<script id="myhq-sensory-app">
/* ============================================================
   SENSORY / BODY CHECK
============================================================ */

let profileId   = null;
let currentQ    = 0;
let answers     = {};

const QUESTIONS = [
  {
    id:      'noise',
    icon:    '👂',
    question:'How is the noise level?',
    hint:    'Is it too loud, or just right?',
    answers: [
      { label:'Too loud', emoji:'📢', value:'flag', action:'Go somewhere quieter, or use headphones' },
      { label:'Just right', emoji:'✅', value:'ok' },
      { label:'Too quiet', emoji:'🔇', value:'flag', action:'Sometimes too quiet can feel weird too — try some soft music' },
    ]
  },
  {
    id:      'light',
    icon:    '💡',
    question:'How is the light?',
    hint:    'Too bright, too dark, or okay?',
    answers: [
      { label:'Too bright', emoji:'☀️', value:'flag', action:'Dim the lights or move somewhere darker' },
      { label:'Fine', emoji:'✅', value:'ok' },
      { label:'Too dark', emoji:'🌑', value:'flag', action:'Turn on a light or move near a window' },
    ]
  },
  {
    id:      'clothes',
    icon:    '👕',
    question:'How do your clothes feel?',
    hint:    'Any tags, seams, or tightness bothering you?',
    answers: [
      { label:'Scratchy', emoji:'😣', value:'flag', action:'Change clothes if you can, or roll up tight sleeves' },
      { label:'Fine', emoji:'✅', value:'ok' },
    ]
  },
  {
    id:      'hungry',
    icon:    '🍎',
    question:'How is your tummy?',
    hint:    'Hungry? Full? Just right?',
    answers: [
      { label:'Hungry', emoji:'🍽️', value:'flag', action:'Get a snack — your brain needs food to work well' },
      { label:'Fine', emoji:'✅', value:'ok' },
      { label:'Too full', emoji:'😮‍💨', value:'flag', action:'Sit quietly for a bit and let your tummy settle' },
    ]
  },
  {
    id:      'temp',
    icon:    '🌡️',
    question:'How is your temperature?',
    hint:    'Too hot, too cold, or just right?',
    answers: [
      { label:'Too hot', emoji:'🥵', value:'flag', action:'Get some cool air or a cold drink' },
      { label:'Just right', emoji:'✅', value:'ok' },
      { label:'Too cold', emoji:'🥶', value:'flag', action:'Get a blanket, hoodie, or warm drink' },
    ]
  },
  {
    id:      'touch',
    icon:    '🤝',
    question:'Does your body feel okay?',
    hint:    'Any pain, or does anything feel wrong?',
    answers: [
      { label:'Something hurts', emoji:'🩹', value:'flag', action:'Tell an adult what hurts so they can help' },
      { label:'Feels fine', emoji:'✅', value:'ok' },
    ]
  },
];

/* ── BUILD SCAN CARDS ── */
function buildCards() {
  const container = document.getElementById('scanCards');
  container.innerHTML = '';

  QUESTIONS.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = `scan-card${i === 0 ? ' active' : ''}`;
    card.id        = `scan-${i}`;

    const answersHtml = q.answers.map(a => `
      <button class="answer-btn ${a.value}" data-qid="${q.id}" data-value="${a.value}" data-action="${a.action || ''}">
        <span class="ab-emoji">${a.emoji}</span>
        ${a.label}
      </button>
    `).join('');

    card.innerHTML = `
      <span class="scan-icon">${q.icon}</span>
      <div class="scan-question">${q.question}</div>
      <div class="scan-hint">${q.hint}</div>
      <div class="answer-row">${answersHtml}</div>
    `;

    // Bind answer buttons
    card.querySelectorAll('.answer-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        card.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        answers[q.id] = { value: btn.dataset.value, action: btn.dataset.action };
        setTimeout(() => nextQuestion(i), 350);
      });
    });

    container.appendChild(card);
  });
}

/* ── NEXT QUESTION ── */
function nextQuestion(current) {
  currentQ = current + 1;
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';

  document.querySelectorAll('.scan-card').forEach(c => c.classList.remove('active'));

  if (currentQ < QUESTIONS.length) {
    document.getElementById(`scan-${currentQ}`).classList.add('active');
  } else {
    showResults();
  }
}

/* ── SHOW RESULTS ── */
function showResults() {
  const flagged  = Object.entries(answers).filter(([, a]) => a.value === 'flag');
  const allOk    = flagged.length === 0;
  const panel    = document.getElementById('resultsPanel');
  const items    = document.getElementById('resultsItems');
  const actionEl = document.getElementById('actionBtns');

  document.getElementById('resultsTitle').textContent = allOk
    ? 'Your body feels good! ✅'
    : `${flagged.length} thing${flagged.length>1?'s':''} to take care of 💜`;

  items.innerHTML = '';

  if (allOk) {
    items.innerHTML = `
      <div class="all-ok">
        <span class="all-ok-emoji">🌟</span>
        <div class="all-ok-title">All clear!</div>
        <div class="all-ok-sub">Your body is feeling comfortable right now.</div>
      </div>`;
  } else {
    // Show flagged items with actions
    flagged.forEach(([qid, ans]) => {
      const q   = QUESTIONS.find(x => x.id === qid);
      const el  = document.createElement('div');
      el.className = 'result-item flagged';
      el.innerHTML = `
        <span class="ri-icon">${q.icon}</span>
        <div class="ri-info">
          <div class="ri-label">${q.question.replace('?','')}</div>
          <div class="ri-action flagged">→ ${ans.action || 'Try to fix this if you can'}</div>
        </div>
      `;
      items.appendChild(el);
    });

    // Alert parent if flagged items exist
    const alertBanner = document.getElementById('alertBanner');
    triggerParentAlert(flagged);
    alertBanner.classList.add('show');
  }

  // Action buttons
  actionEl.innerHTML = '';
  if (!allOk) {
    const calmBtn = document.createElement('a');
    calmBtn.className = 'act-btn primary';
    calmBtn.href      = 'calm-corner.html';
    calmBtn.textContent = '🌿 Go to Calm Corner';
    actionEl.appendChild(calmBtn);
  }

  const homeBtn = document.createElement('a');
  homeBtn.className   = 'act-btn';
  homeBtn.href        = 'index.html';
  homeBtn.textContent = '🏠 Back to Home';
  actionEl.appendChild(homeBtn);

  panel.classList.add('show');
  panel.scrollIntoView({ behavior:'smooth', block:'start' });

  // Auto-add to check-in data
  Store.setProfile(profileId, `sensory-${new Date().toDateString()}`, {
    answers,
    flagged: flagged.map(([id]) => id),
    date:    new Date().toISOString(),
  });
}

/* ── PARENT ALERT ── */
function triggerParentAlert(flagged) {
  if (flagged.length === 0) return;

  // Check for volcano active this session
  const today        = new Date().toDateString();
  const volcanoData  = Store.getProfile(profileId, `volcano-today-${today}`, null);
  const urgency      = volcanoData?.max >= 3 ? 'actionable' : 'fyi';

  const alerts = Store.get('parent-alerts', []);
  alerts.unshift({
    id:        Date.now(),
    profileId,
    type:      'sensory-flag',
    data:      {
      flagged:  flagged.map(([id,a]) => ({ id, action: a.action })),
      urgency,
    },
    date:      new Date().toISOString(),
    read:      false,
  });
  Store.set('parent-alerts', alerts.slice(0, 200));
}

/* ── INIT ── */
function init() {
  const session = Auth.getSession();
  if (!session || !['elder','younger'].includes(session.profileId)) {
    window.location.href = 'index.html'; return;
  }
  profileId = session.profileId;
  Profiles.applyTheme(profileId);

  const mascot = MYHQ.MASCOTS.find(m => m.id === Profiles.get(profileId).mascot) || MYHQ.MASCOTS[0];
  document.getElementById('headerEmoji').textContent = mascot.emoji;

  buildCards();

  document.getElementById('backBtn').addEventListener('click', () => {
    history.length > 1 ? history.back() : window.location.href = 'feelings-hub.html';
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
