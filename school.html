<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>School — My HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style id="myhq-styles">
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d0d1a; --surface:#12122a; --card:#1a1a3e;
  --accent:#a78bfa; --accent2:#34d399; --text:#f1f5f9;
  --text-muted:#94a3b8; --star:#fbbf24; --danger:#f87171;
  --success:#4ade80; --radius:20px; --radius-sm:12px;
  --font-main:'Nunito',sans-serif; --font-display:'Fredoka One',cursive;
}
html,body { min-height:100vh; font-family:var(--font-main); background:var(--bg); color:var(--text); overflow-x:hidden; }

/* TOPBAR */
.topbar { position:sticky; top:0; z-index:50; background:var(--surface); border-bottom:1px solid rgba(255,255,255,0.06); padding:12px 16px; display:flex; align-items:center; gap:10px; }
.back-btn { background:var(--card); border:none; border-radius:10px; padding:8px 12px; color:var(--text); font-size:18px; cursor:pointer; transition:all .2s; flex-shrink:0; }
.back-btn:hover { background:var(--accent); }
.topbar-title { font-family:var(--font-display); font-size:22px; color:var(--accent); flex:1; }
.add-btn { background:var(--accent); border:none; border-radius:var(--radius-sm); padding:8px 14px; color:#fff; font-size:14px; font-weight:900; cursor:pointer; font-family:var(--font-main); transition:all .2s; flex-shrink:0; }
.add-btn:hover { transform:scale(1.05); }

.page { max-width:600px; margin:0 auto; padding:16px 16px 100px; }

/* TYPE TABS */
.type-tabs { display:flex; gap:8px; margin-bottom:16px; }
.type-tab {
  flex:1; background:var(--card);
  border:2px solid rgba(255,255,255,0.08);
  border-radius:var(--radius-sm); padding:12px 6px;
  text-align:center; cursor:pointer; transition:all .2s;
  font-family:var(--font-main); color:var(--text-muted);
}
.type-tab:hover { border-color:var(--accent); }
.type-tab.active { border-color:var(--tab-color,var(--accent)); background:rgba(167,139,250,0.1); color:var(--text); }
.type-tab .tab-emoji { font-size:22px; display:block; margin-bottom:4px; }
.type-tab .tab-label { font-size:12px; font-weight:800; }
.type-tab .tab-count { font-size:11px; font-weight:700; color:var(--tab-color,var(--accent)); margin-top:2px; }

/* DUE TODAY STRIP */
.due-today-strip {
  background:linear-gradient(135deg, rgba(248,113,113,0.15), rgba(251,146,60,0.1));
  border:2px solid rgba(248,113,113,0.25);
  border-radius:var(--radius); padding:14px 16px;
  margin-bottom:16px; display:none;
}
.due-today-strip.show { display:block; animation:fadeIn .3s ease; }
.due-today-title { font-size:14px; font-weight:900; color:var(--danger); margin-bottom:8px; }
.due-today-items { display:flex; flex-direction:column; gap:6px; }
.due-today-item { font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }

/* ADD FORM */
.add-form {
  background:var(--card); border:2px solid var(--accent);
  border-radius:var(--radius); padding:20px;
  margin-bottom:16px; display:none; animation:slideDown .3s ease;
}
.add-form.open { display:block; }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn    { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.form-title { font-family:var(--font-display); font-size:20px; color:var(--accent); margin-bottom:16px; }
.form-row { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.form-row.two-col { flex-direction:row; gap:10px; }
.form-row.two-col > * { flex:1; }
.field-label { font-size:12px; font-weight:800; color:var(--text-muted); }
.field-input, .field-select {
  width:100%; background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,255,255,0.1); border-radius:var(--radius-sm);
  padding:12px 14px; font-size:15px; color:var(--text);
  font-family:var(--font-main); outline:none; transition:border-color .2s;
}
.field-input:focus, .field-select:focus { border-color:var(--accent); }
.field-select option { background:var(--surface); color:var(--text); }
.subject-pills { display:flex; flex-wrap:wrap; gap:6px; }
.subject-pill {
  background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.08);
  border-radius:20px; padding:7px 12px; font-size:13px; font-weight:700;
  cursor:pointer; transition:all .2s; font-family:var(--font-main); color:var(--text-muted);
}
.subject-pill:hover { border-color:var(--accent); color:var(--text); }
.subject-pill.selected { border-color:var(--sub-color,var(--accent)); background:rgba(167,139,250,0.15); color:var(--text); }
.form-btns { display:flex; gap:10px; margin-top:4px; }
.btn-save { flex:1; background:var(--accent); border:none; border-radius:var(--radius-sm); padding:13px; font-size:15px; font-weight:900; color:#fff; cursor:pointer; font-family:var(--font-main); transition:all .2s; }
.btn-save:hover { transform:translateY(-1px); }
.btn-cancel { background:var(--card); border:2px solid rgba(255,255,255,0.1); border-radius:var(--radius-sm); padding:13px 18px; font-size:14px; font-weight:700; color:var(--text-muted); cursor:pointer; font-family:var(--font-main); transition:all .2s; }
.btn-cancel:hover { border-color:var(--accent); color:var(--accent); }

/* SECTIONS */
.section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; margin-top:6px; }
.section-title { font-family:var(--font-display); font-size:18px; }
.section-badge { background:var(--accent); color:#fff; border-radius:20px; padding:2px 10px; font-size:12px; font-weight:900; }

/* ITEM CARDS */
.items-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.item-card {
  background:var(--card); border:2px solid rgba(255,255,255,0.06);
  border-radius:var(--radius); padding:16px;
  display:flex; align-items:flex-start; gap:12px;
  transition:all .2s; position:relative; overflow:hidden;
  animation:cardIn .3s ease;
}
@keyframes cardIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.item-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--item-color,var(--accent)); }
.item-card:hover { border-color:var(--item-color,var(--accent)); }
.item-card.done { opacity:.5; }
.item-card.done .item-title { text-decoration:line-through; color:var(--text-muted); }
.item-card.overdue { border-color:rgba(248,113,113,0.4); background:rgba(248,113,113,0.04); }

.item-subject-dot { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.item-body { flex:1; min-width:0; }
.item-title { font-size:15px; font-weight:800; margin-bottom:5px; line-height:1.3; }
.item-meta { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.item-tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; background:rgba(255,255,255,0.06); color:var(--text-muted); }
.item-tag.due-soon  { color:#fb923c; background:rgba(251,146,60,0.12); }
.item-tag.due-today { color:var(--danger); background:rgba(248,113,113,0.12); }
.item-tag.overdue   { color:var(--danger); background:rgba(248,113,113,0.2); }
.item-notes { font-size:12px; color:var(--text-muted); margin-top:5px; font-weight:600; line-height:1.4; }

.item-actions { display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0; }
.done-btn {
  width:36px; height:36px; border-radius:50%; border:3px solid var(--item-color,var(--accent));
  background:transparent; display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer; transition:all .2s;
}
.done-btn:hover { background:var(--item-color,var(--accent)); transform:scale(1.1); }
.item-card.done .done-btn { background:var(--success); border-color:var(--success); }
.del-btn { background:none; border:none; color:var(--text-muted); font-size:16px; cursor:pointer; padding:4px; border-radius:6px; transition:all .2s; }
.del-btn:hover { color:var(--danger); background:rgba(248,113,113,0.1); }

/* COUNTDOWN BADGE */
.countdown-badge {
  font-size:12px; font-weight:900; padding:4px 10px;
  border-radius:20px; text-align:center;
}
.countdown-badge.today   { background:rgba(248,113,113,0.2); color:var(--danger); }
.countdown-badge.soon    { background:rgba(251,146,60,0.15); color:#fb923c; }
.countdown-badge.fine    { background:rgba(52,211,153,0.1); color:var(--accent2); }
.countdown-badge.overdue { background:rgba(248,113,113,0.25); color:var(--danger); }

/* FILTER STRIP */
.filter-strip { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
.filter-strip::-webkit-scrollbar { display:none; }
.f-chip { flex-shrink:0; background:var(--card); border:2px solid rgba(255,255,255,0.08); border-radius:20px; padding:6px 12px; font-size:12px; font-weight:800; cursor:pointer; font-family:var(--font-main); color:var(--text-muted); transition:all .2s; }
.f-chip:hover { border-color:var(--accent); color:var(--text); }
.f-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* EMPTY */
.empty-state { text-align:center; padding:36px 20px; color:var(--text-muted); }
.empty-emoji { font-size:52px; display:block; margin-bottom:10px; }
.empty-title { font-family:var(--font-display); font-size:20px; margin-bottom:6px; }
.empty-sub   { font-size:13px; font-weight:600; }

/* NAV */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:600px; background:var(--surface); border-top:1px solid rgba(255,255,255,0.08); display:flex; z-index:90; padding:8px 0 max(8px,env(safe-area-inset-bottom)); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 4px; cursor:pointer; text-decoration:none; color:var(--text-muted); border:none; background:none; font-family:var(--font-main); transition:color .2s; }
.nav-item .nav-emoji { font-size:22px; }
.nav-item .nav-label { font-size:10px; font-weight:800; }
.nav-item.active { color:var(--accent); }
.sos-fab { position:fixed; bottom:84px; right:20px; z-index:100; background:linear-gradient(135deg,#f87171,#e94560); color:white; border:none; border-radius:50%; width:56px; height:56px; font-size:24px; cursor:pointer; box-shadow:0 4px 20px rgba(233,69,96,.5); display:flex; align-items:center; justify-content:center; animation:sosPulse 3s ease-in-out infinite; }
@keyframes sosPulse { 0%,100%{box-shadow:0 4px 20px rgba(233,69,96,.5)} 50%{box-shadow:0 4px 30px rgba(233,69,96,.8),0 0 0 8px rgba(233,69,96,.1)} }
#toastContainer { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; align-items:center; width:90%; max-width:400px; pointer-events:none; }
@keyframes toastIn  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(10px)} }
@keyframes confettiFall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.01ms !important; } }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn">←</button>
  <div class="topbar-title" id="pageTitle">📚 School</div>
  <button class="add-btn" id="addBtn">+ Add</button>
</div>

<main class="page">

  <!-- Due today alert strip -->
  <div class="due-today-strip" id="dueTodayStrip">
    <div class="due-today-title">📅 Due Today!</div>
    <div class="due-today-items" id="dueTodayItems"></div>
  </div>

  <!-- Type tabs -->
  <div class="type-tabs">
    <div class="type-tab active" data-type="homework" style="--tab-color:#a78bfa">
      <span class="tab-emoji">📝</span>
      <span class="tab-label">Homework</span>
      <span class="tab-count" id="hwCount">0</span>
    </div>
    <div class="type-tab" data-type="tests" style="--tab-color:#f87171">
      <span class="tab-emoji">📋</span>
      <span class="tab-label">Tests</span>
      <span class="tab-count" id="testCount">0</span>
    </div>
    <div class="type-tab" data-type="projects" style="--tab-color:#fbbf24">
      <span class="tab-emoji">🔬</span>
      <span class="tab-label">Projects</span>
      <span class="tab-count" id="projCount">0</span>
    </div>
  </div>

  <!-- Add form -->
  <div class="add-form" id="addForm">
    <div class="form-title" id="formTitle">Add Homework 📝</div>

    <div class="form-row">
      <div class="field-label">Subject</div>
      <div class="subject-pills" id="subjectPills"></div>
    </div>

    <div class="form-row">
      <div class="field-label">What is it?</div>
      <input type="text" class="field-input" id="itemTitle" placeholder="e.g. Pages 12-15 in math book" maxlength="80">
    </div>

    <div class="form-row two-col">
      <div>
        <div class="field-label" id="dueDateLabel">Due date</div>
        <input type="date" class="field-input" id="itemDate">
      </div>
      <div id="priorityCol">
        <div class="field-label">How hard?</div>
        <select class="field-select" id="itemDifficulty">
          <option value="easy">😊 Easy</option>
          <option value="medium" selected>😐 Medium</option>
          <option value="hard">😤 Hard</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="field-label">Notes (optional)</div>
      <input type="text" class="field-input" id="itemNotes" placeholder="Any extra details..." maxlength="120">
    </div>

    <div class="form-btns">
      <button class="btn-save" id="saveItemBtn">Save ✓</button>
      <button class="btn-cancel" id="cancelItemBtn">Cancel</button>
    </div>
  </div>

  <!-- Filter strip -->
  <div class="filter-strip" id="filterStrip"></div>

  <!-- Lists -->
  <div id="hwSection">
    <div class="section-hdr">
      <div class="section-title">📝 To Do</div>
      <span class="section-badge" id="hwTodoBadge">0</span>
    </div>
    <div class="items-list" id="hwTodoList"></div>

    <div class="section-hdr mt-8">
      <div class="section-title" style="color:var(--text-muted);font-size:16px">✅ Done</div>
    </div>
    <div class="items-list" id="hwDoneList"></div>
  </div>

  <div id="testSection" style="display:none">
    <div class="section-hdr">
      <div class="section-title">📋 Upcoming Tests</div>
      <span class="section-badge" style="background:#f87171" id="testBadge">0</span>
    </div>
    <div class="items-list" id="testList"></div>
  </div>

  <div id="projSection" style="display:none">
    <div class="section-hdr">
      <div class="section-title">🔬 Projects</div>
      <span class="section-badge" style="background:#fbbf24;color:#431407" id="projBadge">0</span>
    </div>
    <div class="items-list" id="projList"></div>
  </div>

</main>

</nav>

<script>

/* ============================================================
   MY HQ — CORE LIBRARY  (myhq-core.js)
============================================================ */

const MYHQ = {
  VERSION: '1.0.0',
  PREFIX: 'myhq-',
  PROFILES: { ELDER: 'elder', YOUNGER: 'younger', FAMILY: 'family', PARENT: 'parent' },
  THEMES: {
    DEFAULT_ELDER:   { name: 'Starlight',    bg:'#1a1a2e', surface:'#16213e', card:'#0f3460', accent:'#e94560', accent2:'#533483', text:'#eaeaea', textMuted:'#a0a0b0', star:'#ffd700' },
    DEFAULT_YOUNGER: { name: 'Cotton Candy', bg:'#f8f0ff', surface:'#fff0f8', card:'#ffffff', accent:'#c084fc', accent2:'#fb7185', text:'#2d1b69', textMuted:'#7c3aed',  star:'#fbbf24' },
    CALM:            { name: 'Calm',         bg:'#f0f4f0', surface:'#e8f0e8', card:'#ffffff', accent:'#4ade80', accent2:'#60a5fa', text:'#1a2e1a', textMuted:'#4b7a4b',  star:'#fbbf24' },
    OCEAN:           { name: 'Ocean',        bg:'#0d1b2a', surface:'#1b263b', card:'#415a77', accent:'#00b4d8', accent2:'#90e0ef', text:'#e0fbfc', textMuted:'#a8dadc',  star:'#ffd700' },
    SUNSET:          { name: 'Sunset',       bg:'#fff7ed', surface:'#fef3c7', card:'#ffffff', accent:'#f97316', accent2:'#ec4899', text:'#431407', textMuted:'#92400e',  star:'#fbbf24' },
    NIGHT:           { name: 'Night Sky',    bg:'#0a0a1a', surface:'#111128', card:'#1a1a38', accent:'#818cf8', accent2:'#34d399', text:'#f1f5f9', textMuted:'#94a3b8',  star:'#fbbf24' },
    FOREST:          { name: 'Forest',       bg:'#f0fdf4', surface:'#dcfce7', card:'#ffffff', accent:'#16a34a', accent2:'#65a30d', text:'#14532d', textMuted:'#166534',  star:'#fbbf24' },
    BUBBLEGUM:       { name: 'Bubblegum',    bg:'#fff0f8', surface:'#fce7f3', card:'#ffffff', accent:'#ec4899', accent2:'#a855f7', text:'#500724', textMuted:'#9d174d',  star:'#fbbf24' },
  },
  MOODS: [
    { id:'rad',         emoji:'🤩', label:'Rad!',     color:'#fbbf24' },
    { id:'good',        emoji:'😊', label:'Good',     color:'#4ade80' },
    { id:'okay',        emoji:'😐', label:'Okay',     color:'#60a5fa' },
    { id:'meh',         emoji:'😕', label:'Meh',      color:'#a78bfa' },
    { id:'sad',         emoji:'😢', label:'Sad',      color:'#818cf8' },
    { id:'mad',         emoji:'😠', label:'Mad',      color:'#f87171' },
    { id:'scared',      emoji:'😨', label:'Scared',   color:'#fb923c' },
    { id:'tired',       emoji:'😴', label:'Tired',    color:'#94a3b8' },
    { id:'overwhelmed', emoji:'🤯', label:'Too Much', color:'#e879f9' },
    { id:'silly',       emoji:'🤪', label:'Silly',    color:'#34d399' },
  ],
  ENERGY: [
    { id:1, emoji:'🪫', label:'Empty' },
    { id:2, emoji:'😴', label:'Low' },
    { id:3, emoji:'😐', label:'Okay' },
    { id:4, emoji:'😊', label:'Good' },
    { id:5, emoji:'🚀', label:'Full Power' },
  ],
  MASCOTS: [
    { id:'star',      emoji:'⭐', name:'Star' },
    { id:'moon',      emoji:'🌙', name:'Moon' },
    { id:'sun',       emoji:'☀️',  name:'Sun' },
    { id:'rainbow',   emoji:'🌈', name:'Rainbow' },
    { id:'unicorn',   emoji:'🦄', name:'Unicorn' },
    { id:'dragon',    emoji:'🐉', name:'Dragon' },
    { id:'butterfly', emoji:'🦋', name:'Butterfly' },
    { id:'cat',       emoji:'🐱', name:'Cat' },
    { id:'fox',       emoji:'🦊', name:'Fox' },
    { id:'owl',       emoji:'🦉', name:'Owl' },
    { id:'penguin',   emoji:'🐧', name:'Penguin' },
    { id:'bear',      emoji:'🐻', name:'Bear' },
    { id:'bunny',     emoji:'🐰', name:'Bunny' },
    { id:'panda',     emoji:'🐼', name:'Panda' },
    { id:'frog',      emoji:'🐸', name:'Frog' },
    { id:'axolotl',   emoji:'🦎', name:'Axolotl' },
    { id:'mushroom',  emoji:'🍄', name:'Mushroom' },
    { id:'flower',    emoji:'🌸', name:'Flower' },
    { id:'crystal',   emoji:'💎', name:'Crystal' },
    { id:'robot',     emoji:'🤖', name:'Robot' },
  ]
};

/* --- STORAGE --- */
const Store = {
  get(key, fallback = null) {
    try { const v = localStorage.getItem(MYHQ.PREFIX + key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(MYHQ.PREFIX + key, JSON.stringify(value)); return true; }
    catch { return false; }
  },
  remove(key) { localStorage.removeItem(MYHQ.PREFIX + key); },
  getProfile(pid, key, fallback = null) { return this.get(`profile-${pid}-${key}`, fallback); },
  setProfile(pid, key, value)           { return this.set(`profile-${pid}-${key}`, value); },
};

/* --- AUTH --- */
const Auth = {
  SESSION_KEY: 'session',
  SESSION_DURATION: 4 * 60 * 60 * 1000,
  hashPin(pin) {
    let hash = 0;
    const str = pin + 'myhq-salt-2024';
    for (let i = 0; i < str.length; i++) {
      const c = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + c;
      hash = hash & hash;
    }
    return Math.abs(hash).toString(36);
  },
  setPin(profileId, pin) {
    if (!pin || pin.length < 4) return false;
    const profiles = Store.get('auth-profiles', {});
    profiles[profileId] = { pinHash: this.hashPin(pin), hasPin: true, setAt: Date.now() };
    Store.set('auth-profiles', profiles);
    return true;
  },
  hasPin(profileId) { return Store.get('auth-profiles', {})[profileId]?.hasPin === true; },
  verifyPin(profileId, pin) {
    const p = Store.get('auth-profiles', {})[profileId];
    if (!p?.hasPin) return true;
    return p.pinHash === this.hashPin(pin);
  },
  verifyBothParentPins(pinA, pinB) {
    return this.verifyPin('parent-a', pinA) && this.verifyPin('parent-b', pinB);
  },
  startSession(profileId) {
    const session = { profileId, startedAt: Date.now(), expiresAt: Date.now() + this.SESSION_DURATION };
    Store.set(this.SESSION_KEY, session);
    return session;
  },
  getSession() {
    const s = Store.get(this.SESSION_KEY);
    if (!s) return null;
    if (Date.now() > s.expiresAt) { this.endSession(); return null; }
    return s;
  },
  getCurrentProfile() { return this.getSession()?.profileId || null; },
  endSession()        { Store.remove(this.SESSION_KEY); },
  isParent()          { const p = this.getCurrentProfile(); return p === 'parent-a' || p === 'parent-b' || p === 'parent'; },
  getDeviceProfile()  { return Store.get('device-profile', null); },
  setDeviceProfile(profileId) { Store.set('device-profile', profileId); },
};

function isColorDark(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 < 128;
}

/* --- TOAST --- */
const Toast = {
  _container: null,
  _init() {
    if (this._container) return;
    this._container = document.createElement('div');
    this._container.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:400px;';
    document.body.appendChild(this._container);
    if (!document.querySelector('#toast-styles')) {
      const s = document.createElement('style');
      s.id = 'toast-styles';
      s.textContent = '@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}';
      document.head.appendChild(s);
    }
  },
  show(message, type = 'info', duration = 3000) {
    this._init();
    const icons  = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️', star:'⭐' };
    const colors = { success:'#4ade80', error:'#f87171', warning:'#fbbf24', info:'#60a5fa', star:'#fbbf24' };
    const t = document.createElement('div');
    t.style.cssText = `background:var(--card,#fff);color:var(--text,#000);border:2px solid ${colors[type]||colors.info};border-radius:16px;padding:12px 20px;font-size:15px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;pointer-events:all;cursor:pointer;animation:toastIn .3s ease;width:100%;font-family:var(--font-main,sans-serif);`;
    t.innerHTML = `<span>${icons[type]||'💬'}</span><span>${message}</span>`;
    t.addEventListener('click', () => t.remove());
    this._container.appendChild(t);
    setTimeout(() => { t.style.animation = 'toastOut .3s ease forwards'; setTimeout(() => t.remove(), 300); }, duration);
  },
  success(m) { this.show(m, 'success'); },
  error(m)   { this.show(m, 'error'); },
  warning(m) { this.show(m, 'warning'); },
  star(m)    { this.show(m, 'star', 4000); },
};

const Points = {

  add(pid, amount, reason, source = 'manual') {
    const balance = this.getBalance(pid) + amount;

    const h = this.getHistory(pid);
    h.unshift({ id:Date.now(), type:'spent', amount, reason, balance:nb, date:new Date().toISOString() });

};

const RewardStore = {
  getRewards()     { return Store.get('reward-store', []); },

  saveReward(reward) {
    const all = this.getRewards();
    const idx = all.findIndex(r => r.id === reward.id);
    const item = { ...reward, id: reward.id || `reward-${Date.now()}` };
    if (idx >= 0) all[idx] = item; else all.push(item);
    Store.set('reward-store', all);
    return item;
  },

  deleteReward(id) {
    Store.set('reward-store', this.getRewards().filter(r => r.id !== id));
  },

  requestRedemption(pid, rewardId) {
    const reward  = this.getRewards().find(r => r.id === rewardId);
    if (!reward) return false;
    const balance = Points.getBalance(pid);
    if (balance < reward.cost) return false;

    const redemption = {
      id:       `redeem-${Date.now()}`,
      profileId: pid,
      rewardId,
      rewardName: reward.name,
      cost:     reward.cost,
      status:   'pending',
      requestedAt: new Date().toISOString(),
    };

    // Hold points (deduct immediately, refund if denied)
    Points.spend(pid, reward.cost, `Reward request: ${reward.name}`);

    // Add to pending
    const all = Store.get('reward-redemptions', []);
    all.unshift(redemption);
    Store.set('reward-redemptions', all.slice(0, 200));

    // Alert parents
    const alerts = Store.get('parent-alerts', []);
    alerts.unshift({
      id: Date.now(), profileId: pid,
      type: 'reward-request',
      data: redemption,
      date: new Date().toISOString(),
      read: false,
    });
    Store.set('parent-alerts', alerts.slice(0, 200));

    return redemption;
  },

  approveRedemption(redemptionId) {
    const all = Store.get('reward-redemptions', []);
    const idx = all.findIndex(r => r.id === redemptionId);
    if (idx >= 0) {
      all[idx].status = 'approved';
      all[idx].approvedAt = new Date().toISOString();
      Store.set('reward-redemptions', all);
    }
  },

  denyRedemption(redemptionId) {
    const all = Store.get('reward-redemptions', []);
    const idx = all.findIndex(r => r.id === redemptionId);
    if (idx >= 0) {
      const r = all[idx];
      r.status = 'denied';
      r.deniedAt = new Date().toISOString();
      Store.set('reward-redemptions', all);
      // Refund points
      Points.add(r.profileId, r.cost, `Refund: ${r.rewardName}`, 'refund');
    }
  },

      routed:    false,
    };
    entries.unshift(entry);
    Store.setProfile(pid, 'thoughts', entries.slice(0, 300));

    if (isUrgent) {
      const alerts = Store.get('parent-alerts', []);
      alerts.unshift({ id: Date.now(), profileId: pid, type: 'urgent-thought', data: entry, date: new Date().toISOString(), read: false });
      Store.set('parent-alerts', alerts.slice(0, 200));
    }
    return entry;
  },

  delete(pid, id) {
    Store.setProfile(pid, 'thoughts', this.getEntries(pid).filter(e => e.id !== id));
  },

  markRouted(pid, id) {
    const entries = this.getEntries(pid);
    const idx = entries.findIndex(e => e.id === id);
    if (idx >= 0) { entries[idx].routed = true; Store.setProfile(pid, 'thoughts', entries); }
  },
};

/* Expose new globals */
window.School      = School;
window.RewardStore = RewardStore;
window.ThoughtJar  = ThoughtJar;

</script>
<script id="myhq-school-app">
/* ============================================================
   SCHOOL PAGE
============================================================ */
let profileId   = null;
let activeType  = 'homework';
let activeFilter = 'all';
let selectedSubject = 'math';
let editingId   = null;

function toast(msg, type='info', dur=3000) {
  const c=document.getElementById('toastContainer');
  const col={success:'#4ade80',error:'#f87171',star:'#fbbf24',info:'#60a5fa'};
  const ic={success:'✅',error:'❌',star:'⭐',info:'ℹ️'};
  const t=document.createElement('div');
  t.style.cssText=`background:var(--card);color:var(--text);border:2px solid ${col[type]||col.info};border-radius:16px;padding:12px 20px;font-size:15px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;pointer-events:all;animation:toastIn .3s ease;width:100%;font-family:var(--font-main);`;
  t.innerHTML=`<span>${ic[type]||'💬'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .3s ease forwards';setTimeout(()=>t.remove(),300);},dur);
}

function confetti() {
  const emojis=['⭐','🌟','✨','🎉','📚','💫','💛'];
  for(let i=0;i<40;i++){setTimeout(()=>{const el=document.createElement('div');el.textContent=emojis[Math.floor(Math.random()*emojis.length)];el.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-20px;font-size:${Math.random()*14+14}px;z-index:9998;pointer-events:none;animation:confettiFall ${Math.random()*2+1}s ease-in forwards;`;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);},Math.random()*600);}
}

/* ── DATE HELPERS ── */
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const due  = new Date(dateStr);
  const now  = new Date();
  due.setHours(23,59,59,0); now.setHours(0,0,0,0);
  return Math.ceil((due - now) / 86400000);
}

function dueBadge(days) {
  if (days === null) return '';
  if (days < 0)  return `<span class="countdown-badge overdue">Overdue ${Math.abs(days)}d</span>`;
  if (days === 0) return `<span class="countdown-badge today">Due today!</span>`;
  if (days <= 2)  return `<span class="countdown-badge soon">Due in ${days}d</span>`;
  return `<span class="countdown-badge fine">Due in ${days}d</span>`;
}

function dueTag(days) {
  if (days === null) return '';
  if (days < 0)  return `<span class="item-tag overdue">Overdue</span>`;
  if (days === 0) return `<span class="item-tag due-today">Due today</span>`;
  if (days <= 2)  return `<span class="item-tag due-soon">Due soon</span>`;
  return '';
}

function formatDate(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

/* ── SUBJECT PILLS ── */
function buildSubjectPills() {
  const wrap = document.getElementById('subjectPills');
  wrap.innerHTML = '';
  School.SUBJECTS.forEach(s => {
    const el = document.createElement('button');
    el.className = `subject-pill${s.id===selectedSubject?' selected':''}`;
    el.style.setProperty('--sub-color', s.color);
    el.dataset.id = s.id;
    el.textContent = `${s.emoji} ${s.label}`;
    el.addEventListener('click', () => {
      wrap.querySelectorAll('.subject-pill').forEach(p=>p.classList.remove('selected'));
      el.classList.add('selected');
      selectedSubject = s.id;
    });
    wrap.appendChild(el);
  });
}

/* ── FILTER STRIP ── */
function buildFilterStrip() {
  const filters = [
    {id:'all',label:'All'},
    {id:'todo',label:'To Do'},
    ...School.SUBJECTS.map(s=>({id:s.id, label:`${s.emoji} ${s.label}`})),
  ];
  const strip = document.getElementById('filterStrip');
  strip.innerHTML = '';
  filters.forEach(f => {
    const chip = document.createElement('button');
    chip.className = `f-chip${f.id===activeFilter?' active':''}`;
    chip.textContent = f.label;
    chip.addEventListener('click', () => {
      strip.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = f.id;
      renderAll();
    });
    strip.appendChild(chip);
  });
}

/* ── BUILD ITEM CARD ── */
function buildItemCard(item, type) {
  const sub  = School.subjectById(item.subject);
  const days = daysUntil(item.dueDate || item.date);
  const done = !!item.done;

  const card = document.createElement('div');
  card.className = `item-card${done?' done':''}${days!==null&&days<0&&!done?' overdue':''}`;
  card.style.setProperty('--item-color', sub.color);

  const diffEmoji = {easy:'😊',medium:'😐',hard:'😤'}[item.difficulty]||'😐';
  const tags = [
    `<span class="item-tag" style="color:${sub.color};background:${sub.color}22">${sub.emoji} ${sub.label}</span>`,
    item.dueDate||item.date ? `<span class="item-tag">${formatDate(item.dueDate||item.date)}</span>` : '',
    dueTag(days),
    type==='homework' ? `<span class="item-tag">${diffEmoji} ${item.difficulty||'medium'}</span>` : '',
  ].filter(Boolean).join('');

  card.innerHTML = `
    <div class="item-subject-dot" style="background:${sub.color}22">${sub.emoji}</div>
    <div class="item-body">
      <div class="item-title">${item.title}</div>
      <div class="item-meta">${tags}</div>
      ${item.notes ? `<div class="item-notes">${item.notes}</div>` : ''}
    </div>
    <div class="item-actions">
      ${dueBadge(days)}
      <button class="done-btn" data-id="${item.id}" data-type="${type}" aria-label="Mark done">${done?'✓':''}</button>
      <button class="del-btn" data-id="${item.id}" data-type="${type}">🗑</button>
    </div>
  `;

  if (!done) {
    card.querySelector('.done-btn').addEventListener('click', () => markDone(item.id, type, card));
  }
  card.querySelector('.del-btn').addEventListener('click', () => deleteItem(item.id, type, card));

  return card;
}

/* ── MARK DONE ── */
function markDone(id, type, card) {
  if (type === 'homework') School.markHomeworkDone(profileId, id);
  else if (type === 'tests') {
    const t = School.getTests(profileId).find(x=>x.id===id);
    if (t) { t.done=true; t.doneAt=new Date().toISOString(); School.saveTest(profileId,t); Points.add(profileId,10,'Test done 📋','school'); }
  }
  else if (type === 'projects') {
    const p = School.getProjects(profileId).find(x=>x.id===id);
    if (p) { p.done=true; p.doneAt=new Date().toISOString(); School.saveProject(profileId,p); Points.add(profileId,15,'Project done 🔬','school'); }
  }
  confetti();
  toast('+5 stars! Homework done! 📚', 'star');
  renderAll();
}

/* ── DELETE ── */
function deleteItem(id, type, card) {
  if (type==='homework') School.deleteHomework(profileId,id);
  else if (type==='tests') School.deleteTest(profileId,id);
  else if (type==='projects') School.deleteProject(profileId,id);
  card.style.animation='cardOut .2s ease forwards';
  setTimeout(()=>renderAll(), 200);
}

/* ── SAVE ITEM ── */
function saveItem() {
  const title = document.getElementById('itemTitle').value.trim();
  if (!title) { toast('What is the homework?', 'warning'); return; }

  const dateVal = document.getElementById('itemDate').value;
  const notes   = document.getElementById('itemNotes').value.trim();
  const diff    = document.getElementById('itemDifficulty').value;

  const item = {
    id:         editingId || undefined,
    title,
    subject:    selectedSubject,
    difficulty: diff,
    notes,
    done:       false,
    addedAt:    new Date().toISOString(),
  };

  if (activeType === 'homework')  { item.dueDate = dateVal; School.saveHomework(profileId, item); }
  else if (activeType === 'tests')    { item.date = dateVal; School.saveTest(profileId, item); }
  else if (activeType === 'projects') { item.dueDate = dateVal; School.saveProject(profileId, item); }

  resetForm();
  toast('Saved! 📚', 'success');
  renderAll();
}

function resetForm() {
  document.getElementById('addForm').classList.remove('open');
  document.getElementById('itemTitle').value = '';
  document.getElementById('itemNotes').value = '';
  document.getElementById('itemDate').value  = '';
  editingId = null;
}

/* ── DUE TODAY STRIP ── */
function renderDueToday() {
  const items = School.getDueToday(profileId);
  const strip = document.getElementById('dueTodayStrip');
  const list  = document.getElementById('dueTodayItems');
  if (items.length === 0) { strip.classList.remove('show'); return; }
  strip.classList.add('show');
  list.innerHTML = items.map(i => {
    const sub = School.subjectById(i.subject);
    return `<div class="due-today-item">${sub.emoji} <strong>${i.title}</strong> <span style="color:var(--text-muted);font-size:12px">${sub.label}</span></div>`;
  }).join('');
}

/* ── RENDER ── */
function renderAll() {
  renderDueToday();
  updateCounts();

  if (activeType === 'homework') renderHomework();
  else if (activeType === 'tests') renderTests();
  else if (activeType === 'projects') renderProjects();
}

function applyFilter(items) {
  if (activeFilter === 'todo') return items.filter(i => !i.done);
  const sub = School.SUBJECTS.find(s => s.id === activeFilter);
  if (sub) return items.filter(i => i.subject === activeFilter);
  return items;
}

function renderHomework() {
  document.getElementById('hwSection').style.display  = '';
  document.getElementById('testSection').style.display = 'none';
  document.getElementById('projSection').style.display = 'none';

  const all      = applyFilter(School.getHomework(profileId));
  const todo     = all.filter(i=>!i.done).sort((a,b)=>new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999'));
  const done     = all.filter(i=>i.done).slice(0,5);
  const todoList = document.getElementById('hwTodoList');
  const doneList = document.getElementById('hwDoneList');

  todoList.innerHTML='';
  if (todo.length===0) todoList.innerHTML=`<div class="empty-state"><span class="empty-emoji">🎉</span><div class="empty-title">No homework!</div><div class="empty-sub">Enjoy your free time ✨</div></div>`;
  else todo.forEach(i=>todoList.appendChild(buildItemCard(i,'homework')));

  doneList.innerHTML='';
  done.forEach(i=>doneList.appendChild(buildItemCard(i,'homework')));

  document.getElementById('hwTodoBadge').textContent = todo.length;
}

function renderTests() {
  document.getElementById('hwSection').style.display  = 'none';
  document.getElementById('testSection').style.display = '';
  document.getElementById('projSection').style.display = 'none';

  const all  = applyFilter(School.getTests(profileId)).sort((a,b)=>new Date(a.date||'9999')-new Date(b.date||'9999'));
  const list = document.getElementById('testList');
  list.innerHTML='';
  if (all.length===0) list.innerHTML=`<div class="empty-state"><span class="empty-emoji">📋</span><div class="empty-title">No tests added</div><div class="empty-sub">Add a test to start studying!</div></div>`;
  else all.forEach(i=>list.appendChild(buildItemCard(i,'tests')));
  document.getElementById('testBadge').textContent = all.filter(i=>!i.done).length;
}

function renderProjects() {
  document.getElementById('hwSection').style.display  = 'none';
  document.getElementById('testSection').style.display = 'none';
  document.getElementById('projSection').style.display = '';

  const all  = applyFilter(School.getProjects(profileId)).sort((a,b)=>new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999'));
  const list = document.getElementById('projList');
  list.innerHTML='';
  if (all.length===0) list.innerHTML=`<div class="empty-state"><span class="empty-emoji">🔬</span><div class="empty-title">No projects</div><div class="empty-sub">Add a project when you get one!</div></div>`;
  else all.forEach(i=>list.appendChild(buildItemCard(i,'projects')));
  document.getElementById('projBadge').textContent = all.filter(i=>!i.done).length;
}

function updateCounts() {
  document.getElementById('hwCount').textContent   = School.getHomework(profileId).filter(i=>!i.done).length;
  document.getElementById('testCount').textContent = School.getTests(profileId).filter(i=>!i.done).length;
  document.getElementById('projCount').textContent = School.getProjects(profileId).filter(i=>!i.done).length;
}

/* ── OPEN FORM ── */
function openAddForm() {
  editingId = null;
  const labels = { homework:'Add Homework 📝', tests:'Add Test 📋', projects:'Add Project 🔬' };
  document.getElementById('formTitle').textContent = labels[activeType];
  const dueLabelEl = document.getElementById('dueDateLabel');
  dueLabelEl.textContent = activeType==='tests' ? 'Test date' : 'Due date';
  document.getElementById('priorityCol').style.display = activeType==='homework' ? '' : 'none';
  buildSubjectPills();
  document.getElementById('addForm').classList.add('open');
  document.getElementById('itemTitle').focus();
  // Set today's date as default
  const d = new Date(); d.setDate(d.getDate()+1);
  document.getElementById('itemDate').value = d.toISOString().split('T')[0];
}

/* ── INIT ── */
function init() {
  const session = Auth.getSession();
  if (!session||!['elder','younger'].includes(session.profileId)) { window.location.href='index.html'; return; }
  profileId = session.profileId;
  Profiles.applyTheme(profileId);

  const profile = Profiles.get(profileId);
  const mascot  = MYHQ.MASCOTS.find(m=>m.id===profile.mascot)||MYHQ.MASCOTS[0];
  document.getElementById('pageTitle').textContent = `${mascot.emoji} School`;
  document.title = `School — ${profile.appName||'My HQ'}`;

  buildFilterStrip();
  renderAll();

  // Type tabs
  document.querySelectorAll('.type-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      activeType = tab.dataset.type;
      document.getElementById('addForm').classList.remove('open');
      activeFilter = 'all';
      buildFilterStrip();
      renderAll();
    });
  });

  document.getElementById('backBtn').addEventListener('click',   ()=>window.location.href='index.html');
  document.getElementById('addBtn').addEventListener('click',    openAddForm);
  document.getElementById('saveItemBtn').addEventListener('click',  saveItem);
  document.getElementById('cancelItemBtn').addEventListener('click', ()=>resetForm());
}

document.addEventListener('DOMContentLoaded', init);
</script>
