<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Big Feelings — My HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style id="myhq-styles">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0818;--surface:#110f22;--card:#1a1838;
  --accent:#a78bfa;--accent2:#34d399;--text:#f1f5f9;
  --text-muted:#94a3b8;--danger:#f87171;--success:#4ade80;
  --radius:24px;--radius-sm:14px;
  --font-main:'Nunito',sans-serif;--font-display:'Fredoka One',cursive;
  /* Dynamic — updated by JS as level changes */
  --level-color:#a78bfa;
  --level-bg:rgba(167,139,250,0.1);
}
html,body{min-height:100vh;font-family:var(--font-main);background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .6s ease;}

/* Sky that changes with level */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,var(--level-bg) 0%,transparent 70%);
  transition:background .6s ease;pointer-events:none;
}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.page{width:100%;padding:20px 20px 100px;display:flex;flex-direction:column;align-items:center;gap:20px;}

/* BACK */
.back-btn{position:fixed;top:16px;left:16px;z-index:100;background:rgba(255,255,255,.08);border:none;border-radius:12px;padding:10px 16px;color:rgba(200,200,255,.7);font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font-main);backdrop-filter:blur(8px);transition:all .2s;}
.back-btn:hover{background:rgba(255,255,255,.15);color:#fff;}

/* HEADER */
.header{text-align:center;padding-top:60px;}
.header-mascot{font-size:64px;display:block;animation:floatM 3s ease-in-out infinite;margin-bottom:8px;}
@keyframes floatM{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.header-title{font-family:var(--font-display);font-size:clamp(24px,6vw,34px);color:var(--accent);margin-bottom:6px;}
.header-sub{font-size:15px;font-weight:700;color:var(--text-muted);max-width:320px;line-height:1.5;}

/* WAVE / LEVEL DISPLAY */
.level-display{
  width:100%;
  background:var(--card);border:2px solid rgba(255,255,255,.06);
  border-radius:var(--radius);padding:24px 20px;
  text-align:center;position:relative;overflow:hidden;
  transition:border-color .4s ease;
}
.level-display.active{border-color:var(--level-color);}
.level-wave-bg{
  position:absolute;bottom:0;left:0;right:0;
  transition:height .5s cubic-bezier(.34,1.56,.64,1),background .5s;
  height:0%;background:var(--level-bg);
}
.level-content{position:relative;z-index:1;}
.level-emoji{font-size:72px;display:block;margin-bottom:8px;transition:all .3s ease;filter:drop-shadow(0 4px 12px var(--level-color));}
.level-name{font-family:var(--font-display);font-size:28px;color:var(--level-color);transition:color .3s;margin-bottom:4px;}
.level-desc{font-size:14px;font-weight:700;color:var(--text-muted);min-height:20px;transition:all .3s;}

/* SCALE */
.scale-wrap{width:100%;}
.scale-label{font-size:12px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;text-align:center;}

/* 5-step scale (7yo) */
.scale-5{display:flex;gap:6px;justify-content:center;flex-wrap:nowrap;width:100%;}
.scale-btn-5{
  flex:1;
  background:#1a1838;border:3px solid rgba(255,255,255,0.12);
  border-radius:var(--radius);padding:12px 4px;
  text-align:center;cursor:pointer;transition:all .2s;
  font-family:var(--font-main);color:var(--text);
  min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.scale-btn-5:hover{transform:scale(1.05);border-color:var(--btn-color,var(--accent));}
.scale-btn-5.selected{
  border-color:var(--btn-color,var(--accent));
  background:var(--btn-bg,rgba(167,139,250,.15));
  transform:scale(1.1);
  box-shadow:0 0 20px var(--btn-color,var(--accent));
}
.sbtn-emoji{font-size:30px;display:block;margin-bottom:6px;}
.sbtn-label{font-size:11px;font-weight:800;color:var(--text-muted);}
.scale-btn-5.selected .sbtn-label{color:var(--text);}

/* 10-step scale (10yo) */
.scale-10{display:flex;flex-direction:column;gap:8px;}
.scale-row-10{display:flex;gap:6px;}
.scale-btn-10{
  flex:1;background:#1a1838;border:2px solid rgba(255,255,255,0.1);
  border-radius:var(--radius-sm);padding:10px 4px;
  text-align:center;cursor:pointer;transition:all .2s;
  font-family:var(--font-main);color:var(--text);
  min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.scale-btn-10:hover{border-color:var(--btn-color,var(--accent));transform:scale(1.04);}
.scale-btn-10.selected{
  border-color:var(--btn-color,var(--accent));
  background:var(--btn-bg,rgba(167,139,250,.15));
  box-shadow:0 0 12px var(--btn-color,var(--accent));
}
.sbtn10-num{font-size:18px;font-weight:900;display:block;margin-bottom:2px;}
.sbtn10-emoji{font-size:18px;display:block;margin-bottom:2px;}
.sbtn10-label{font-size:9px;font-weight:800;color:var(--text-muted);}
.scale-btn-10.selected .sbtn10-label{color:var(--text);}

/* ROUTING PANEL (appears after selection) */
.routing-panel{
  width:100%;display:none;flex-direction:column;gap:10px;
  animation:panelIn .4s ease;
}
.routing-panel.show{display:flex;}
@keyframes panelIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.route-title{font-family:var(--font-display);font-size:18px;color:var(--level-color);text-align:center;margin-bottom:2px;}
.route-sub{font-size:13px;font-weight:700;color:var(--text-muted);text-align:center;margin-bottom:4px;}

.route-btn{
  background:var(--card);border:2px solid rgba(255,255,255,.08);
  border-radius:var(--radius);padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .2s;text-decoration:none;color:var(--text);
  font-family:var(--font-main);width:100%;
}
.route-btn:hover{border-color:var(--rb-color,var(--accent));transform:translateX(4px);}
.route-btn .rb-emoji{font-size:28px;flex-shrink:0;}
.route-btn .rb-info{flex:1;text-align:left;}
.route-btn .rb-title{font-size:15px;font-weight:900;}
.route-btn .rb-sub{font-size:12px;font-weight:600;color:var(--text-muted);margin-top:2px;}
.route-btn .rb-arrow{font-size:18px;color:var(--rb-color,var(--accent));flex-shrink:0;}

.route-btn.primary{
  background:linear-gradient(135deg,rgba(var(--rb-rgb,167,139,250),.2),rgba(var(--rb-rgb,167,139,250),.05));
  border-color:rgba(var(--rb-rgb,167,139,250),.4);
}

/* NEED HELP BUTTON */
.need-help-btn{
  width:100%;background:rgba(248,113,113,.1);
  border:2px solid rgba(248,113,113,.25);border-radius:var(--radius);
  padding:14px;font-size:14px;font-weight:900;color:var(--danger);
  cursor:pointer;font-family:var(--font-main);transition:all .2s;
  display:none;
}
.need-help-btn.show{display:block;}
.need-help-btn:hover{background:rgba(248,113,113,.2);border-color:var(--danger);}

/* ALERT SENT */
.alert-sent{
  background:rgba(74,222,128,.1);border:2px solid rgba(74,222,128,.25);
  border-radius:var(--radius-sm);padding:14px;
  text-align:center;font-size:13px;font-weight:800;color:var(--success);
  display:none;
}
.alert-sent.show{display:block;animation:panelIn .4s ease;}

/* TOAST */
#toastContainer{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;width:90%;max-width:400px;pointer-events:none;}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;}}
</style>
</head>
<body>

<button class="back-btn" id="backBtn">← Back</button>

<div id="app">
<main class="page">

  <div class="header">
    <span class="header-mascot" id="headerMascot">⭐</span>
    <div class="header-title">How big is this feeling?</div>
    <div class="header-sub" id="headerSub">No wrong answer. Just tell me where you are right now.</div>
  </div>

  <!-- Level display -->
  <div class="level-display" id="levelDisplay">
    <div class="level-wave-bg" id="levelWave"></div>
    <div class="level-content">
      <span class="level-emoji" id="levelEmoji">💜</span>
      <div class="level-name"  id="levelName">Tap a feeling below</div>
      <div class="level-desc"  id="levelDesc">Pick the one that feels most right</div>
    </div>
  </div>

  <!-- Scale (built by JS based on profile age) -->
  <div class="scale-wrap">
    <div class="scale-label" id="scaleLabel">How I feel right now</div>
    <div id="scaleContainer"></div>
  </div>

  <!-- Alert sent confirmation -->
  <div class="alert-sent" id="alertSent">
    💜 A parent has been notified. You're not alone.
  </div>

  <!-- Need help button (danger zone only) -->
  <button class="need-help-btn" id="needHelpBtn">
    🆘 I need to talk to someone RIGHT NOW
  </button>

  <!-- Routing panel -->
  <div class="routing-panel" id="routingPanel">
    <div class="route-title" id="routeTitle">Here are some things that might help</div>
    <div class="route-sub"   id="routeSub"></div>
    <div id="routeBtns"></div>
  </div>

</main>
</div>

<div id="toastContainer"></div>

<script src="myhq-core.js"></script>
<script id="myhq-volcano-app">
/* ============================================================
   VOLCANO METER (Big Feelings Meter)
============================================================ */

let profileId    = null;
let complexity   = 'simple';  // 'simple' = 7yo (1-5), 'full' = 10yo (1-10)
let selectedLevel = 0;

/* ── LEVEL DATA ── */
const LEVELS_5 = [
  { level:1, emoji:'😌', name:'A little',  desc:'Just a tiny wave',       color:'#60a5fa', rgb:'96,165,250',  danger:false },
  { level:2, emoji:'😕', name:'Medium',    desc:'I feel something',        color:'#a78bfa', rgb:'167,139,250', danger:false },
  { level:3, emoji:'😢', name:'A lot',     desc:'This is getting hard',    color:'#fb923c', rgb:'251,146,60',  danger:true  },
  { level:4, emoji:'😤', name:'Really big',desc:'Really hard right now',   color:'#f87171', rgb:'248,113,113', danger:true  },
  { level:5, emoji:'🤯', name:'HUGE',      desc:'The biggest feeling',     color:'#e94560', rgb:'233,69,96',   danger:true  },
];

const LEVELS_10 = [
  { level:1,  emoji:'😌', name:'Calm',       desc:'All good',               color:'#34d399', rgb:'52,211,153',  danger:false },
  { level:2,  emoji:'😊', name:'Pretty good',desc:'Just a small feeling',   color:'#4ade80', rgb:'74,222,128',  danger:false },
  { level:3,  emoji:'😐', name:'Okay',       desc:'Something on my mind',   color:'#60a5fa', rgb:'96,165,250',  danger:false },
  { level:4,  emoji:'😕', name:'A bit off',  desc:'Not quite right',        color:'#818cf8', rgb:'129,140,248', danger:false },
  { level:5,  emoji:'😟', name:'Difficult',  desc:'Getting harder',         color:'#a78bfa', rgb:'167,139,250', danger:false },
  { level:6,  emoji:'😰', name:'Hard',       desc:'I\'m struggling',        color:'#c084fc', rgb:'192,132,252', danger:false },
  { level:7,  emoji:'😤', name:'Really hard',desc:'This is a big one',      color:'#fb923c', rgb:'251,146,60',  danger:true  },
  { level:8,  emoji:'😢', name:'A lot',      desc:'I really need help',     color:'#f87171', rgb:'248,113,113', danger:true  },
  { level:9,  emoji:'😠', name:'Very big',   desc:'Almost at the edge',     color:'#ef4444', rgb:'239,68,68',   danger:true  },
  { level:10, emoji:'🤯', name:'HUGE',       desc:'The biggest feeling',    color:'#e94560', rgb:'233,69,96',   danger:true  },
];

/* ── ROUTING OPTIONS BY LEVEL CATEGORY ── */
function getRoutes(level, maxLevel) {
  const pct = level / maxLevel;

  if (pct <= 0.4) {
    // Low — calm tools
    return {
      title: 'You\'re okay 💚',
      sub:   'Here are some gentle things to try:',
      routes: [
        { emoji:'🌿', title:'Calm Corner',     sub:'Games, breathing, fidget timer', href:'calm-corner.html',    color:'#4ade80', rgb:'74,222,128',  primary:true },
        { emoji:'🌿', title:'Catch Fireflies',  sub:'Calming catching game',         href:'firefly.html',        color:'#4ade80', rgb:'74,222,128'  },
        { emoji:'💜', title:'Check In',         sub:'Log how you\'re feeling',       href:'checkin.html',        color:'#a78bfa', rgb:'167,139,250' },
      ]
    };
  } else if (pct <= 0.6) {
    // Mid
    return {
      title: 'That\'s a real feeling 💜',
      sub:   'Let\'s try to help:',
      routes: [
        { emoji:'🌈', title:'Reset Toolkit',   sub:'Work through it step by step', href:'reset-toolkit.html',  color:'#a78bfa', rgb:'167,139,250', primary:true },
        { emoji:'⏱️', title:'Fidget Timer',    sub:'Take a purposeful break',      href:'fidget-timer.html',   color:'#60a5fa', rgb:'96,165,250'  },
        { emoji:'🌿', title:'Calm Corner',     sub:'Something gentle to do',       href:'calm-corner.html',    color:'#34d399', rgb:'52,211,153'  },
        { emoji:'🫁', title:'Breathing',       sub:'Breathe together',             href:'calm-corner.html#breathe', color:'#818cf8', rgb:'129,140,248' },
      ]
    };
  } else {
    // High / danger
    return {
      title: 'This is really hard 💜',
      sub:   'You don\'t have to deal with this alone:',
      routes: [
        { emoji:'🌈', title:'Reset Toolkit',   sub:'Guided steps through big feelings', href:'reset-toolkit.html', color:'#f87171', rgb:'248,113,113', primary:true },
        { emoji:'🫁', title:'Breathe With Me', sub:'Let\'s slow down together',         href:'calm-corner.html#breathe', color:'#fb923c', rgb:'251,146,60' },
        { emoji:'🌿', title:'Fidget Timer',    sub:'Move your body first',              href:'fidget-timer.html',  color:'#a78bfa', rgb:'167,139,250' },
      ]
    };
  }
}

/* ── BUILD 5-STEP SCALE ── */
function build5Scale() {
  const container = document.getElementById('scaleContainer');
  const row = document.createElement('div');
  row.className = 'scale-5';

  LEVELS_5.forEach(lvl => {
    const btn = document.createElement('button');
    btn.className = 'scale-btn-5';
    btn.style.setProperty('--btn-color', lvl.color);
    btn.style.setProperty('--btn-bg',    `rgba(${lvl.rgb},0.15)`);
    btn.dataset.level = lvl.level;
    btn.innerHTML = `<span class="sbtn-emoji">${lvl.emoji}</span><span class="sbtn-label">${lvl.name}</span>`;
    btn.addEventListener('click', () => selectLevel(lvl, LEVELS_5.length));
    row.appendChild(btn);
  });

  container.appendChild(row);
}

/* ── BUILD 10-STEP SCALE ── */
function build10Scale() {
  const container = document.getElementById('scaleContainer');
  const wrap = document.createElement('div');
  wrap.className = 'scale-10';

  // Row 1: 1-5
  const row1 = document.createElement('div');
  row1.className = 'scale-row-10';
  // Row 2: 6-10
  const row2 = document.createElement('div');
  row2.className = 'scale-row-10';

  LEVELS_10.forEach((lvl, i) => {
    const btn = document.createElement('button');
    btn.className = 'scale-btn-10';
    btn.style.setProperty('--btn-color', lvl.color);
    btn.style.setProperty('--btn-bg',    `rgba(${lvl.rgb},0.15)`);
    btn.dataset.level = lvl.level;
    btn.innerHTML = `
      <span class="sbtn10-num" style="color:${lvl.color}">${lvl.level}</span>
      <span class="sbtn10-emoji">${lvl.emoji}</span>
      <span class="sbtn10-label">${lvl.name}</span>
    `;
    btn.addEventListener('click', () => selectLevel(lvl, LEVELS_10.length));
    (i < 5 ? row1 : row2).appendChild(btn);
  });

  wrap.appendChild(row1);
  wrap.appendChild(row2);
  container.appendChild(wrap);
}

/* ── SELECT LEVEL ── */
function selectLevel(lvl, maxLevel) {
  selectedLevel = lvl.level;

  // Update scale button states
  document.querySelectorAll('.scale-btn-5, .scale-btn-10').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-level="${lvl.level}"]`)?.classList.add('selected');

  // Update level display
  const display = document.getElementById('levelDisplay');
  display.classList.add('active');
  document.getElementById('levelEmoji').textContent = lvl.emoji;
  document.getElementById('levelName').textContent  = lvl.name;
  document.getElementById('levelDesc').textContent  = lvl.desc;
  document.getElementById('levelWave').style.height = `${(lvl.level/maxLevel)*100}%`;

  // Update CSS vars
  document.documentElement.style.setProperty('--level-color', lvl.color);
  document.documentElement.style.setProperty('--level-bg',    `rgba(${lvl.rgb},0.12)`);

  // Show/hide need help button
  const nhBtn = document.getElementById('needHelpBtn');
  nhBtn.classList.toggle('show', lvl.danger);

  // Log to store (daily high-water mark)
  const today   = new Date().toDateString();
  const stored  = Store.getProfile(profileId, `volcano-today-${today}`, { max:0, entries:[] });
  if (lvl.level > stored.max) stored.max = lvl.level;
  stored.entries.push({ level:lvl.level, ts: Date.now() });
  Store.setProfile(profileId, `volcano-today-${today}`, stored);

  // Parent alert for danger zone
  if (lvl.danger) {
    triggerParentAlert(lvl);
  }

  // Show routing
  showRouting(lvl, maxLevel);
}

/* ── SHOW ROUTING ── */
function showRouting(lvl, maxLevel) {
  const panel  = document.getElementById('routingPanel');
  const routes = getRoutes(lvl.level, maxLevel);

  document.getElementById('routeTitle').textContent = routes.title;
  document.getElementById('routeSub').textContent   = routes.sub;
  document.getElementById('routeTitle').style.color = lvl.color;

  const btns = document.getElementById('routeBtns');
  btns.innerHTML = '';

  routes.routes.forEach(r => {
    const btn = document.createElement('a');
    btn.className = `route-btn${r.primary ? ' primary' : ''}`;
    btn.href      = r.href;
    btn.style.setProperty('--rb-color', r.color);
    btn.style.setProperty('--rb-rgb',   r.rgb);
    btn.innerHTML = `
      <span class="rb-emoji">${r.emoji}</span>
      <div class="rb-info">
        <div class="rb-title">${r.title}</div>
        <div class="rb-sub">${r.sub}</div>
      </div>
      <span class="rb-arrow">→</span>
    `;
    btns.appendChild(btn);
  });

  panel.classList.add('show');
  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

/* ── PARENT ALERT ── */
function triggerParentAlert(lvl) {
  const alerts = Store.get('parent-alerts', []);
  // Avoid duplicate alerts within 5 minutes
  const recent = alerts.find(a =>
    a.type === 'volcano-high' && a.profileId === profileId &&
    Date.now() - new Date(a.date).getTime() < 300000
  );
  if (recent) return;

  alerts.unshift({
    id:        Date.now(),
    profileId,
    type:      'volcano-high',
    data:      { feelingLevel: lvl.level, levelName: lvl.name },
    date:      new Date().toISOString(),
    read:      false,
  });
  Store.set('parent-alerts', alerts.slice(0, 200));

  document.getElementById('alertSent').classList.add('show');

  // Push notification stub
  if (window.PushNotifications) {
    PushNotifications.send(
      `Big feelings alert`,
      `${Profiles.get(profileId)?.displayName || 'Your child'} is at level ${lvl.level} (${lvl.name})`,
      'urgent'
    );
  }
}

/* ── NEED HELP ── */
function triggerNeedHelp() {
  const alerts = Store.get('parent-alerts', []);
  alerts.unshift({
    id:        Date.now(),
    profileId,
    type:      'needs-help',
    data:      { feelingLevel: selectedLevel, message:'I need to talk to someone right now' },
    date:      new Date().toISOString(),
    read:      false,
  });
  Store.set('parent-alerts', alerts.slice(0, 200));
  document.getElementById('alertSent').textContent = '🆘 A parent has been notified. Someone is coming. 💜';
  document.getElementById('alertSent').classList.add('show');
  document.getElementById('needHelpBtn').style.opacity = '0.5';
  document.getElementById('needHelpBtn').disabled = true;
}

/* ── INIT ── */
function init() {
  const session = Auth.getSession();
  if (!session || !['elder','younger'].includes(session.profileId)) {
    window.location.href = 'index.html'; return;
  }
  profileId  = session.profileId;
  complexity = profileId === 'elder' ? 'full' : 'simple';
  Profiles.applyTheme(profileId);

  const profile = Profiles.get(profileId);
  const mascot  = MYHQ.MASCOTS.find(m => m.id === profile.mascot) || MYHQ.MASCOTS[0];
  document.getElementById('headerMascot').textContent = mascot.emoji;

  // Adjust language slightly for younger
  if (complexity === 'simple') {
    document.querySelector('.header-title').textContent = 'How big is this feeling?';
  } else {
    document.querySelector('.header-title').textContent = 'How are you feeling right now?';
  }

  // Build appropriate scale
  if (complexity === 'full') {
    build10Scale();
  } else {
    build5Scale();
  }

  // Back button
  document.getElementById('backBtn').addEventListener('click', () => {
    history.length > 1 ? history.back() : window.location.href = 'index.html';
  });

  // Need help
  document.getElementById('needHelpBtn').addEventListener('click', triggerNeedHelp);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
