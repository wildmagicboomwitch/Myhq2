<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wins Replay — My HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style id="myhq-styles">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0d14;--surface:#0f1420;--card:#151e2e;--accent:#fbbf24;--accent2:#34d399;--text:#f1f5f9;--text-muted:#64748b;--star:#fbbf24;--danger:#f87171;--success:#4ade80;--radius:20px;--radius-sm:12px;--font-main:'Nunito',sans-serif;--font-display:'Fredoka One',cursive;}
html,body{min-height:100vh;font-family:var(--font-main);background:var(--bg);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(251,191,36,0.07) 0%,transparent 70%),var(--bg);pointer-events:none;}
#app{position:relative;z-index:1;max-width:600px;margin:0 auto;}
.topbar{padding:16px 20px 0;display:flex;align-items:center;gap:10px;}
.back-btn{background:var(--card);border:none;border-radius:10px;padding:8px 12px;color:var(--text);font-size:18px;cursor:pointer;transition:all .2s;}
.back-btn:hover{background:var(--accent);color:#431407;}
.topbar-title{font-family:var(--font-display);font-size:22px;color:var(--accent);flex:1;}
.page{padding:16px 20px 100px;display:flex;flex-direction:column;gap:16px;}

/* HERO */
.hero{text-align:center;padding:12px 0;}
.hero-emoji{font-size:64px;display:block;margin-bottom:8px;animation:starFloat 2s ease-in-out infinite;}
@keyframes starFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
.hero-title{font-family:var(--font-display);font-size:26px;color:var(--accent);margin-bottom:6px;}
.hero-sub{font-size:14px;font-weight:700;color:var(--text-muted);line-height:1.5;max-width:300px;margin:0 auto;}

/* SHUFFLE */
.shuffle-btn{width:100%;background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(52,211,153,.08));border:2px solid rgba(251,191,36,.25);border-radius:var(--radius);padding:16px;font-family:var(--font-display);font-size:18px;color:var(--accent);cursor:pointer;transition:all .2s;}
.shuffle-btn:hover{border-color:var(--accent);transform:scale(1.02);}

/* WIN CARD CAROUSEL */
.carousel-wrap{position:relative;overflow:hidden;border-radius:var(--radius);}
.carousel-inner{display:flex;transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.win-slide{flex-shrink:0;width:100%;}

.win-showcase{
  background:var(--card);border-radius:var(--radius);padding:28px 24px;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;
  border:2px solid rgba(251,191,36,.15);min-height:220px;justify-content:center;
  position:relative;overflow:hidden;
}
.win-showcase::before{content:'✨';position:absolute;top:12px;left:12px;font-size:20px;opacity:.3;}
.win-showcase::after{content:'✨';position:absolute;bottom:12px;right:12px;font-size:20px;opacity:.3;}
.ws-emoji{font-size:48px;filter:drop-shadow(0 4px 12px rgba(251,191,36,.4));}
.ws-text{font-size:18px;font-weight:800;line-height:1.4;max-width:280px;}
.ws-cat{font-size:12px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;}
.ws-date{font-size:11px;font-weight:700;color:var(--text-muted);}

/* DOT INDICATORS */
.carousel-dots{display:flex;gap:8px;justify-content:center;}
.carousel-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .2s;}
.carousel-dot.active{background:var(--accent);transform:scale(1.3);}

/* CAROUSEL CONTROLS */
.carousel-controls{display:flex;gap:10px;}
.car-btn{flex:1;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:12px;font-size:18px;cursor:pointer;transition:all .2s;color:var(--text-muted);}
.car-btn:hover{border-color:var(--accent);color:var(--accent);}

/* AFFIRMATION */
.affirmation{
  background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(52,211,153,.06));
  border:2px solid rgba(251,191,36,.15);border-radius:var(--radius);
  padding:20px 24px;text-align:center;
}
.aff-text{font-family:var(--font-display);font-size:18px;color:var(--accent);line-height:1.4;}

/* SECTION TITLE */
.section-title{font-family:var(--font-display);font-size:18px;color:var(--text);}

/* MINI WINS LIST */
.mini-wins{display:flex;flex-direction:column;gap:8px;}
.mini-win{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;transition:border-color .2s;}
.mini-win:hover{border-color:rgba(251,191,36,.3);}
.mw-emoji{font-size:22px;flex-shrink:0;}
.mw-text{font-size:13px;font-weight:800;flex:1;}
.mw-date{font-size:11px;font-weight:700;color:var(--text-muted);flex-shrink:0;}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-emoji{font-size:56px;display:block;margin-bottom:12px;}
.empty-title{font-family:var(--font-display);font-size:22px;margin-bottom:6px;}
.empty-link{display:inline-block;margin-top:12px;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:14px;font-weight:900;color:#431407;text-decoration:none;cursor:pointer;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:var(--surface);border-top:1px solid rgba(255,255,255,.08);display:flex;z-index:90;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;text-decoration:none;color:var(--text-muted);border:none;background:none;font-family:var(--font-main);transition:color .2s;}
.nav-item .nav-emoji{font-size:22px;}.nav-item .nav-label{font-size:10px;font-weight:800;}
.nav-item.active{color:var(--accent);}
.sos-fab{position:fixed;bottom:84px;right:20px;z-index:100;background:linear-gradient(135deg,#f87171,#e94560);color:white;border:none;border-radius:50%;width:56px;height:56px;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(233,69,96,.5);display:flex;align-items:center;justify-content:center;animation:sosPulse 3s ease-in-out infinite;}
@keyframes sosPulse{0%,100%{box-shadow:0 4px 20px rgba(233,69,96,.5)}50%{box-shadow:0 4px 30px rgba(233,69,96,.8),0 0 0 8px rgba(233,69,96,.1)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;}}
</style>
</head>
<body>
<div id="app">
<div class="topbar">
  <button class="back-btn" id="backBtn">←</button>
  <div class="topbar-title">🌟 Wins Replay</div>
</div>
<main class="page">

  <div class="hero">
    <span class="hero-emoji">🌟</span>
    <div class="hero-title">Remember what you've done</div>
    <div class="hero-sub">Hard days happen to everyone. Look at what you've already gotten through!</div>
  </div>

  <!-- Main content injected by JS -->
  <div id="mainContent"></div>

</main>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><span class="nav-emoji">🏠</span><span class="nav-label">Home</span></a>
  <a class="nav-item" href="chores.html"><span class="nav-emoji">✅</span><span class="nav-label">Jobs</span></a>
  <a class="nav-item active" href="feelings-hub.html"><span class="nav-emoji">💜</span><span class="nav-label">Feelings</span></a>
  <a class="nav-item" href="school.html"><span class="nav-emoji">📚</span><span class="nav-label">School</span></a>
  <a class="nav-item" href="wins.html"><span class="nav-emoji">⭐</span><span class="nav-label">Wins</span></a>
</nav>
<button class="sos-fab" onclick="window.location.href='volcano.html'">🆘</button>

<script src="myhq-core.js"></script>
<script id="myhq-winsreplay-app">
/* ============================================================
   WINS REPLAY
============================================================ */
let profileId  = null;
let allWins    = [];
let replayWins = [];
let slideIdx   = 0;

const AFFIRMATIONS = [
  'You are stronger than you think. 💜',
  'Every hard thing you got through made you tougher.',
  'You\'ve done hard things before. You can do this too. 🌟',
  'Look at how much you\'ve already done. That\'s YOU.',
  'You don\'t have to be perfect to be amazing. ✨',
  'Even on hard days, you showed up. That counts.',
  'You are doing better than you think. 💚',
  'Small wins are still wins. Every single one.',
];

function formatDate(iso) {
  const d = new Date(iso);
  const diff = Math.floor((Date.now() - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7)   return `${diff} days ago`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function buildContent() {
  const main = document.getElementById('mainContent');

  if (allWins.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <span class="empty-emoji">🌱</span>
        <div class="empty-title">No wins yet!</div>
        <div style="font-size:13px;font-weight:700;">Start adding wins — even tiny things count!</div>
        <a class="empty-link" href="wins.html">Add a win ⭐</a>
      </div>`;
    return;
  }

  // Pick 5 wins for replay — mix of categories, prioritise brave/hard_day
  replayWins = shuffleWins(allWins);
  slideIdx   = 0;

  const affirmation = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];

  main.innerHTML = `
    <button class="shuffle-btn" id="shuffleBtn">🔀 Show me different wins</button>

    <div class="carousel-wrap" id="carouselWrap">
      <div class="carousel-inner" id="carouselInner"></div>
    </div>
    <div class="carousel-dots" id="carouselDots"></div>
    <div class="carousel-controls">
      <button class="car-btn" id="prevSlide">‹ Previous</button>
      <button class="car-btn" id="nextSlide">Next ›</button>
    </div>

    <div class="affirmation">
      <div class="aff-text" id="affText">${affirmation}</div>
    </div>

    <div class="section-title">More of your wins 🌟</div>
    <div class="mini-wins" id="miniWins"></div>
  `;

  buildCarousel();
  buildMiniWins();
  bindCarousel();

  document.getElementById('shuffleBtn').addEventListener('click', () => {
    replayWins = shuffleWins(allWins);
    slideIdx   = 0;
    document.getElementById('affText').textContent = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];
    buildCarousel();
    buildMiniWins();
    bindCarousel();
  });
}

function shuffleWins(wins) {
  // Prioritise hard_day, brave, then random
  const priority = wins.filter(w => ['hard_day','brave','feeling'].includes(w.category));
  const rest     = wins.filter(w => !['hard_day','brave','feeling'].includes(w.category));
  const all      = [...priority, ...rest];
  // Shuffle
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.slice(0, 5);
}

function buildCarousel() {
  const inner = document.getElementById('carouselInner');
  const dots  = document.getElementById('carouselDots');
  if (!inner) return;
  inner.innerHTML = '';
  dots.innerHTML  = '';

  replayWins.forEach((win, i) => {
    const slide = document.createElement('div');
    slide.className = 'win-slide';
    slide.innerHTML = `
      <div class="win-showcase">
        <span class="ws-emoji">${win.emoji || '⭐'}</span>
        <div class="ws-text">${win.text}</div>
        <div class="ws-cat">${win.category || 'win'}</div>
        <div class="ws-date">${formatDate(win.date)}</div>
      </div>`;
    inner.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = `carousel-dot${i === 0 ? ' active' : ''}`;
    dots.appendChild(dot);
  });

  goSlide(0);
}

function goSlide(idx) {
  const inner = document.getElementById('carouselInner');
  const dots  = document.querySelectorAll('.carousel-dot');
  if (!inner) return;
  slideIdx = Math.max(0, Math.min(idx, replayWins.length - 1));
  inner.style.transform = `translateX(-${slideIdx * 100}%)`;
  dots.forEach((d, i) => d.classList.toggle('active', i === slideIdx));
}

function bindCarousel() {
  document.getElementById('prevSlide')?.addEventListener('click', () => goSlide(slideIdx - 1));
  document.getElementById('nextSlide')?.addEventListener('click', () => goSlide(slideIdx + 1));
}

function buildMiniWins() {
  const container = document.getElementById('miniWins');
  if (!container) return;
  const rest = allWins.filter(w => !replayWins.includes(w)).slice(0, 8);
  container.innerHTML = '';
  rest.forEach(win => {
    const el = document.createElement('div');
    el.className = 'mini-win';
    el.innerHTML = `<span class="mw-emoji">${win.emoji || '⭐'}</span><span class="mw-text">${win.text}</span><span class="mw-date">${formatDate(win.date)}</span>`;
    container.appendChild(el);
  });
}

function init() {
  const session = Auth.getSession();
  if (!session || !['elder','younger'].includes(session.profileId)) { window.location.href = 'index.html'; return; }
  profileId = session.profileId;
  Profiles.applyTheme(profileId);
  allWins = WinJar.getWins(profileId);
  buildContent();
  document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'feelings-hub.html');
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
